name: CI Centos7

on: [pull_request]

jobs:
  test_apisix:
    name: run ci on centos7
    runs-on: ubuntu-latest

    steps:
    - name: Linux Get dependencies
      run: sudo apt install -y ruby ruby-dev rubygems build-essential rpm

    - name: run test cases
      run: |
        git clone https://github.com/idbeta/build-tools.git
        cd build-tools
        git checkout new-method-to-package
        make package type=rpm app=apisix version=10.10 branch=2.2
        ls output/

